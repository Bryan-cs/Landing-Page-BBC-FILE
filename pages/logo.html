<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBC File Service — Exploración de Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  body { margin: 0; background: #111118; font-family: 'Inter', sans-serif; }
  .logo-bg-dark { background: #0f0f1a; }
  .logo-bg-light { background: #f8fafc; }
  .logo-bg-white { background: #ffffff; }
  .logo-bg-mid { background: #1a1a2e; }
</style>
</head>
<body>
<script type="text/babel">
const { DCSection, DCArtboard, DesignCanvas } = window;

/* ── SHIELD PATHS ── */
// Simple shield: wide top, pointed bottom
const ShieldPath = ({ size = 60, fill = "url(#g1)", stroke }) => (
  <svg width={size} height={size} viewBox="0 0 60 70" fill="none">
    <defs>
      <linearGradient id="g1" x1="0" y1="0" x2="60" y2="70" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stopColor="#6B6FF5"/>
        <stop offset="100%" stopColor="#9B6EF5"/>
      </linearGradient>
      <linearGradient id="g2" x1="0" y1="0" x2="60" y2="70" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stopColor="#1e3a8a"/>
        <stop offset="100%" stopColor="#1d4ed8"/>
      </linearGradient>
      <linearGradient id="g3" x1="0" y1="0" x2="60" y2="70" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stopColor="#065f46"/>
        <stop offset="100%" stopColor="#059669"/>
      </linearGradient>
      <linearGradient id="g4" x1="0" y1="0" x2="60" y2="70" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stopColor="#1e293b"/>
        <stop offset="100%" stopColor="#334155"/>
      </linearGradient>
      <linearGradient id="g5" x1="0" y1="0" x2="60" y2="70" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stopColor="#7c3aed"/>
        <stop offset="100%" stopColor="#db2777"/>
      </linearGradient>
    </defs>
    <path d="M30 2 L56 12 L56 35 C56 52 30 68 30 68 C30 68 4 52 4 35 L4 12 Z"
      fill={fill} stroke={stroke} strokeWidth={stroke ? 2 : 0}/>
  </svg>
);

/* ── LOGO A — Índigo/Violeta + Escudo + Wordmark ── */
const LogoA = ({ dark = true }) => (
  <div style={{ display:'flex', alignItems:'center', gap: 14 }}>
    <div style={{ position:'relative', width:52, height:60 }}>
      <svg width={52} height={60} viewBox="0 0 60 70" fill="none">
        <defs>
          <linearGradient id="gaA" x1="0" y1="0" x2="60" y2="70" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stopColor="#6B6FF5"/>
            <stop offset="100%" stopColor="#9B6EF5"/>
          </linearGradient>
        </defs>
        <path d="M30 2 L56 12 L56 35 C56 52 30 68 30 68 C30 68 4 52 4 35 L4 12 Z" fill="url(#gaA)"/>
        <text x="30" y="44" textAnchor="middle" fill="white" fontFamily="'Space Grotesk', sans-serif" fontWeight="800" fontSize="22" letterSpacing="-1">BB</text>
      </svg>
    </div>
    <div>
      <div style={{ fontFamily:"'Space Grotesk', sans-serif", fontWeight:800, fontSize:20, letterSpacing:'-0.04em', color: dark ? '#e8e8f0' : '#1e293b', lineHeight:1 }}>BBC File</div>
      <div style={{ fontFamily:"'Inter', sans-serif", fontWeight:500, fontSize:10, letterSpacing:'0.12em', textTransform:'uppercase', color: dark ? 'rgba(155,110,245,0.9)' : '#6B6FF5', marginTop:3 }}>Service</div>
    </div>
  </div>
);

/* ── LOGO B — Azul corporativo, escudo moderno ── */
const LogoB = ({ dark = false }) => (
  <div style={{ display:'flex', alignItems:'center', gap: 14 }}>
    <div style={{ position:'relative', width:48, height:56 }}>
      <svg width={48} height={56} viewBox="0 0 60 70" fill="none">
        <defs>
          <linearGradient id="gaB" x1="0" y1="0" x2="60" y2="70" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stopColor="#1e40af"/>
            <stop offset="100%" stopColor="#3b82f6"/>
          </linearGradient>
        </defs>
        <path d="M30 2 L56 12 L56 35 C56 52 30 68 30 68 C30 68 4 52 4 35 L4 12 Z" fill="url(#gaB)"/>
        {/* File icon inside shield */}
        <rect x="21" y="22" width="18" height="24" rx="2" fill="white" opacity="0.2"/>
        <rect x="21" y="22" width="18" height="24" rx="2" fill="none" stroke="white" strokeWidth="1.5"/>
        <line x1="25" y1="30" x2="39" y2="30" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>
        <line x1="25" y1="34" x2="39" y2="34" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>
        <line x1="25" y1="38" x2="33" y2="38" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>
      </svg>
    </div>
    <div>
      <div style={{ fontFamily:"'Inter', sans-serif", fontWeight:800, fontSize:19, letterSpacing:'-0.03em', color: dark ? '#e8e8f0' : '#1e293b', lineHeight:1 }}>BBC<span style={{color:'#3b82f6', marginLeft:4}}>File</span></div>
      <div style={{ fontFamily:"'Inter', sans-serif", fontWeight:400, fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase', color: dark ? '#64748b' : '#94a3b8', marginTop:3 }}>Service · Seguridad Social</div>
    </div>
  </div>
);

/* ── LOGO C — Verde, escudo + checkmark ── */
const LogoC = ({ dark = false }) => (
  <div style={{ display:'flex', alignItems:'center', gap: 14 }}>
    <div style={{ width:50, height:58 }}>
      <svg width={50} height={58} viewBox="0 0 60 70" fill="none">
        <defs>
          <linearGradient id="gaC" x1="0" y1="0" x2="60" y2="70" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stopColor="#064e3b"/>
            <stop offset="100%" stopColor="#10b981"/>
          </linearGradient>
        </defs>
        <path d="M30 2 L56 12 L56 35 C56 52 30 68 30 68 C30 68 4 52 4 35 L4 12 Z" fill="url(#gaC)"/>
        <polyline points="20,36 27,43 42,28" stroke="white" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
      </svg>
    </div>
    <div>
      <div style={{ fontFamily:"'DM Sans', sans-serif", fontWeight:800, fontSize:20, letterSpacing:'-0.04em', color: dark ? '#e8e8f0' : '#064e3b', lineHeight:1 }}>BBC File</div>
      <div style={{ fontFamily:"'DM Sans', sans-serif", fontWeight:500, fontSize:9.5, letterSpacing:'0.14em', textTransform:'uppercase', color:'#10b981', marginTop:3 }}>Service</div>
    </div>
  </div>
);

/* ── LOGO D — Solo marca/monograma oscuro ── */
const LogoD = () => (
  <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12 }}>
    <svg width={80} height={92} viewBox="0 0 60 70" fill="none">
      <defs>
        <linearGradient id="gaD" x1="0" y1="0" x2="60" y2="70" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stopColor="#6B6FF5"/>
          <stop offset="100%" stopColor="#9B6EF5"/>
        </linearGradient>
      </defs>
      <path d="M30 2 L56 12 L56 35 C56 52 30 68 30 68 C30 68 4 52 4 35 L4 12 Z" fill="url(#gaD)"/>
      {/* BB monogram */}
      <text x="30" y="47" textAnchor="middle" fill="white" fontFamily="'Space Grotesk', sans-serif" fontWeight="900" fontSize="26" letterSpacing="-2">BB</text>
    </svg>
    <div style={{ fontFamily:"'Space Grotesk', sans-serif", fontWeight:700, fontSize:13, letterSpacing:'0.18em', textTransform:'uppercase', color:'#6B6FF5' }}>BBC FILE SERVICE</div>
  </div>
);

/* ── LOGO E — Violeta/Rosa, escudo partido ── */
const LogoE = ({ dark = true }) => (
  <div style={{ display:'flex', alignItems:'center', gap: 14 }}>
    <div style={{ width:50, height:58 }}>
      <svg width={50} height={58} viewBox="0 0 60 70" fill="none">
        <defs>
          <linearGradient id="gaE1" x1="0" y1="0" x2="30" y2="70" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stopColor="#6B6FF5"/>
            <stop offset="100%" stopColor="#7c3aed"/>
          </linearGradient>
          <linearGradient id="gaE2" x1="30" y1="0" x2="60" y2="70" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stopColor="#9B6EF5"/>
            <stop offset="100%" stopColor="#db2777"/>
          </linearGradient>
        </defs>
        {/* Shield left half */}
        <path d="M30 2 L4 12 L4 35 C4 52 30 68 30 68 Z" fill="url(#gaE1)"/>
        {/* Shield right half */}
        <path d="M30 2 L56 12 L56 35 C56 52 30 68 30 68 Z" fill="url(#gaE2)"/>
        {/* Center line */}
        <line x1="30" y1="10" x2="30" y2="62" stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
        <text x="30" y="44" textAnchor="middle" fill="white" fontFamily="'Space Grotesk', sans-serif" fontWeight="900" fontSize="20" letterSpacing="-1">BB</text>
      </svg>
    </div>
    <div>
      <div style={{ fontFamily:"'Space Grotesk', sans-serif", fontWeight:800, fontSize:19, letterSpacing:'-0.04em', lineHeight:1 }}>
        <span style={{ background:'linear-gradient(135deg,#6B6FF5,#db2777)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>BBC File</span>
      </div>
      <div style={{ fontFamily:"'Inter', sans-serif", fontWeight:500, fontSize:9.5, letterSpacing:'0.12em', textTransform:'uppercase', color: dark ? '#888' : '#94a3b8', marginTop:3 }}>Service</div>
    </div>
  </div>
);

/* ── LOGO F — Wordmark puro, sin escudo ── */
const LogoF = ({ dark = true }) => (
  <div style={{ display:'flex', alignItems:'center', gap:0 }}>
    <div style={{
      background: 'linear-gradient(135deg,#6B6FF5,#9B6EF5)',
      borderRadius: 10,
      width: 38, height: 38,
      display:'flex', alignItems:'center', justifyContent:'center',
      marginRight: 12,
      flexShrink: 0,
    }}>
      <svg width={20} height={20} viewBox="0 0 24 24" fill="none">
        {/* Shield outline */}
        <path d="M12 2 L20 5.5 L20 13 C20 18 12 22 12 22 C12 22 4 18 4 13 L4 5.5 Z" fill="rgba(255,255,255,0.25)" stroke="white" strokeWidth="1.5" strokeLinejoin="round"/>
        <polyline points="8,12.5 11,15.5 17,9" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
      </svg>
    </div>
    <div>
      <div style={{ fontFamily:"'Space Grotesk', sans-serif", fontWeight:800, fontSize:18, letterSpacing:'-0.04em', color: dark ? '#e8e8f0' : '#1e293b', lineHeight:1 }}>
        BBC<span style={{color:'#6B6FF5'}}> File</span>
      </div>
      <div style={{ fontFamily:"'Inter', sans-serif", fontWeight:500, fontSize:9, letterSpacing:'0.14em', textTransform:'uppercase', color: dark ? 'rgba(107,111,245,0.7)' : '#94a3b8', marginTop:2 }}>Service</div>
    </div>
  </div>
);

/* ── APP ── */
function App() {
  return (
    <DesignCanvas title="BBC File Service — Exploración de Logo">

      <DCSection id="s1" title="Opción A · Índigo/Violeta — Moderno y tecnológico">
        {/* Dark */}
        <DCArtboard id="a1" label="A1 — Sobre fondo oscuro" width={360} height={160}>
          <div className="logo-bg-dark" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <LogoA dark={true}/>
          </div>
        </DCArtboard>
        {/* Light */}
        <DCArtboard id="a2" label="A2 — Sobre fondo blanco" width={360} height={160}>
          <div className="logo-bg-white" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <LogoA dark={false}/>
          </div>
        </DCArtboard>
        {/* XS */}
        <DCArtboard id="a3" label="A3 — Tamaño pequeño (navbar)" width={260} height={160}>
          <div className="logo-bg-dark" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{transform:'scale(0.72)', transformOrigin:'center'}}>
              <LogoA dark={true}/>
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="s2" title="Opción B · Azul corporativo — File icon dentro del escudo">
        <DCArtboard id="b1" label="B1 — Sobre fondo blanco" width={360} height={160}>
          <div className="logo-bg-white" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid #e2e8f0'}}>
            <LogoB dark={false}/>
          </div>
        </DCArtboard>
        <DCArtboard id="b2" label="B2 — Sobre fondo oscuro" width={360} height={160}>
          <div className="logo-bg-dark" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <LogoB dark={true}/>
          </div>
        </DCArtboard>
        <DCArtboard id="b3" label="B3 — Sobre azul oscuro" width={260} height={160}>
          <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f1f40'}}>
            <LogoB dark={true}/>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="s3" title="Opción C · Verde — Confianza financiera, checkmark SS">
        <DCArtboard id="c1" label="C1 — Sobre blanco" width={360} height={160}>
          <div className="logo-bg-white" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid #e2e8f0'}}>
            <LogoC dark={false}/>
          </div>
        </DCArtboard>
        <DCArtboard id="c2" label="C2 — Sobre oscuro" width={360} height={160}>
          <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#071a13'}}>
            <LogoC dark={true}/>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="s4" title="Opción D · Solo marca — Ícono vertical (redes sociales / favicon)">
        <DCArtboard id="d1" label="D1 — Ícono vertical oscuro" width={240} height={200}>
          <div className="logo-bg-dark" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <LogoD/>
          </div>
        </DCArtboard>
        <DCArtboard id="d2" label="D2 — Avatar / favicon 64×64" width={120} height={120}>
          <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#6B6FF5,#9B6EF5)',borderRadius:16}}>
            <svg width={48} height={56} viewBox="0 0 60 70" fill="none">
              <path d="M30 2 L56 12 L56 35 C56 52 30 68 30 68 C30 68 4 52 4 35 L4 12 Z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" strokeWidth="1.5"/>
              <text x="30" y="47" textAnchor="middle" fill="white" fontFamily="'Space Grotesk', sans-serif" fontWeight="900" fontSize="26" letterSpacing="-2">BB</text>
            </svg>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="s5" title="Opción E · Índigo→Rosa — Escudo partido, degradado dual">
        <DCArtboard id="e1" label="E1 — Sobre oscuro" width={360} height={160}>
          <div className="logo-bg-dark" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <LogoE dark={true}/>
          </div>
        </DCArtboard>
        <DCArtboard id="e2" label="E2 — Sobre blanco" width={360} height={160}>
          <div className="logo-bg-white" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid #e2e8f0'}}>
            <LogoE dark={false}/>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="s6" title="Opción F · Cuadrado redondeado — Compacto tipo app">
        <DCArtboard id="f1" label="F1 — Sobre oscuro" width={360} height={160}>
          <div className="logo-bg-dark" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <LogoF dark={true}/>
          </div>
        </DCArtboard>
        <DCArtboard id="f2" label="F2 — Sobre blanco" width={360} height={160}>
          <div className="logo-bg-white" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid #e2e8f0'}}>
            <LogoF dark={false}/>
          </div>
        </DCArtboard>
        <DCArtboard id="f3" label="F3 — Navbar tamaño real" width={300} height={64}>
          <div className="logo-bg-dark" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',paddingLeft:20}}>
            <LogoF dark={true}/>
          </div>
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
